<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cinematic</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				background: #0d0d0d;
				font-family: 'Courier New', monospace;
				height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			.stage {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 16px;
			}

			.big-title {
				color: #3a0a0a;
				font-size: 72px;
				font-weight: 900;
				letter-spacing: 22px;
				text-transform: uppercase;
				text-shadow: 0 0 20px #8b1a1a;
				margin-bottom: 2px;
			}

			.sub-title {
				color: #c9a227;
				font-size: 11px;
				letter-spacing: 10px;
				text-transform: uppercase;
				margin-bottom: 10px;
			}

			.project-pills {
				display: flex;
				gap: 8px;
				justify-content: center;
			}

			.pill {
				border: 1px solid #3a0a0a;
				color: #8b1a1a;
				font-size: 11px;
				font-family: 'Courier New', monospace;
				letter-spacing: 2px;
				padding: 5px 12px;
				border-radius: 2px;
				background: transparent;
				cursor: pointer;
				transition: all 0.2s;
				text-transform: uppercase;
			}

			.pill.active {
				border-color: #c9a227;
				color: #c9a227;
			}
		</style>
	</head>
	<body>
		<div class="stage">
			<div class="big-title">Visualiser</div>
			<div class="sub-title">Select Project</div>
			<div class="project-pills">
				<button class="pill">01 — UI</button>
				<button class="pill active">02 — Data</button>
				<button class="pill">03 — Motion</button>
			</div>
		</div>

		<script>
			document.querySelectorAll('.pill').forEach(function (p) {
				p.onclick = function () {
					document.querySelectorAll('.pill').forEach(function (x) {
						x.classList.remove('active');
					});
					p.classList.add('active');
				};
			});
		</script>
	</body>
</html>
